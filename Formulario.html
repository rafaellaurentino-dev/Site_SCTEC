<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de inscrição</title>
</head>

<body>
    <header>
        <h1>Formulario de inscrição</h1>
        <section id="formulario">
            <form action="">
                <label for="nome">Nome completo: </label>
                <input type="text" id="nome" name="nome" required> <br>

                <label for="email">E-Mail: </label>
                <input type="email" id="email" name="email" required> <br>

                <label for="idade">Idade: </label>
                <input type="number" id="idade" name="idade" min="18" max="50" required> <br>

                <label for="materia">Qual matéria você esta se candidatando para lecionar: </label>
                <select name="materia" id="materia" required>
                    <option value="" selected disabled>Selecione uma matéria</option>
                    <option value="matematica">Matemática</option>
                    <option value="portugues">Português</option>
                    <option value="biologia">Biologia</option>
                    <option value="ciencias">Ciências</option>
                    <option value="historia">História</option>
                    <option value="geografia">Geografia</option>
                    <option value="artes">Artes</option>
                </select> <br>

                <label for="turno">Turno disponível: </label>
                <select name="turno" id="turno" required>
                    <option value="" selected disabled>Selecione um turno</option>
                    <option value="matutino">Matutino</option>
                    <option value="vespertino">Vespertino</option>
                    <option value="noturno">Noturno</option>
                </select> <br>

                <label for="escolaridade">Nível de escolaridade: </label> <br>
                <input type="radio" id="superior-completo" name="escolaridade" value="superior-completo" required>
                <label for="superior-completo">Ensino superior completo</label> <br>
                <input type="radio" id="cursando-mestrado" name="escolaridade" value="cursando-mestrado">
                <label for="cursando-mestrado">Cursando mestrado</label> <br>
                <input type="radio" id="mestrado-completo" name="escolaridade" value="mestrado-completo">
                <label for="mestrado-completo">Mestrado completo</label> <br>
                <input type="radio" id="cursando-doutorado" name="escolaridade" value="cursando-doutorado">
                <label for="cursando-doutorado">Cursando doutorado</label> <br>
                <input type="radio" id="doutorado-completo" name="escolaridade" value="doutorado-completo">
                <label for="doutorado-completo">Doutorado completo</label> <br>

                <label for="descricao">Descrição sobre você:</label> <br>
                <textarea name="descricao" id="descricao" cols="30" rows="5" maxlength="200" required></textarea> <br>
                <p>Maximo de 200 caracteres.</p> <br>

                <input type="submit" value="Enviar formulario">

            </form>
        </section>
    </header> <br>

    <footer>
        <p>Direitos reservados a Rafael Alexandre Pereira Laurentino</p>
        <address>
            E-mail: <a href="mailto:rafa.a.p.laurentino@hotmail.com">rafa.a.p.laurentino@hotmail.com</a>
            Telefone: <a href="tel:+5548991581360">+55(48)9 9158-1360</a>
        </address>
    </footer>
</body>

</html>
